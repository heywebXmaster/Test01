name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run D1 migrations
        run: |
          if [ -d "drizzle/migrations" ]; then
            for f in drizzle/migrations/*.sql; do
              npx wrangler d1 execute db_test_1 --file="$f" --remote
            done
          fi
        env:
          CLOUDFLARE_API_TOKEN: 'MMx5FRZM5sHbFKizI2qRTXyYtyCD1DheZoEvZj2O'
          CLOUDFLARE_ACCOUNT_ID: '8a3eb2fd3bea54d1d7d2d490e0b1a6a2'

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: 'MMx5FRZM5sHbFKizI2qRTXyYtyCD1DheZoEvZj2O'
          accountId: '8a3eb2fd3bea54d1d7d2d490e0b1a6a2'
          command: pages deploy ./public --project-name=test11111
